version: "3.9"

services:

  # ── FastAPI REST API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: alphavision-api:latest
    container_name: alphavision-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=false
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - alphavision-data:/app/data
      - alphavision-models:/app/models
      - alphavision-logs:/app/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - alphavision-net

  # ── Plotly-Dash Dashboard ───────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: alphavision-dashboard:latest
    container_name: alphavision-dashboard
    restart: unless-stopped
    ports:
      - "8050:8050"
    env_file:
      - .env
    environment:
      - DASHBOARD_PORT=8050
    volumes:
      - alphavision-data:/app/data
      - alphavision-models:/app/models
    command: [ "python", "dashboards/app.py" ]
    depends_on:
      api:
        condition: service_healthy
    networks:
      - alphavision-net

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  alphavision-data:
    driver: local
  alphavision-models:
    driver: local
  alphavision-logs:
    driver: local

# ── Network ──────────────────────────────────────────────────────────────────
networks:
  alphavision-net:
    driver: bridge
